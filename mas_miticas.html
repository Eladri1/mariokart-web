<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolas Más Míticas - Retro Center ⚡</title>
    <style>
        body {
            background: linear-gradient(3deg, #0b0b10 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 { color: #ff9900; margin-top: 40px; margin-bottom: 5px; font-size: 28px; text-shadow: 0 0 10px rgba(255,153,0,0.3); font-weight: 800; }
        p { color: #ffffff; margin-bottom: 30px; font-size: 16px; opacity: 0.8; }

        /* ---------------- BOTONES DE NAVEGACIÓN ---------------- */
        #btn-volver {
            position: absolute; top: 20px; left: 20px; text-decoration: none; 
            background: #ffffff; border: 2px solid #ffffff; color: #121212; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; 
            box-shadow: 0 0 15px rgba(255,255,255,0.2); transition: transform 0.2s; z-index: 10;
        }
        #btn-volver:hover { transform: scale(1.05); }

        #btn-cerrar-juego {
            display: none; position: absolute; top: 20px; left: 20px; 
            background: #ff3333; border: none; color: white; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 0 15px rgba(255,51,51,0.5); z-index: 100;
        }
        #btn-cerrar-juego:hover { transform: scale(1.05); }

        /* ---------------- REJILLA DE TARJETAS ---------------- */
        #games-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 900px;
            margin-bottom: 40px;
        }

        .game-card {
            background: #141419;
            border: 2px solid #2a2a35;
            border-radius: 15px;
            width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
        }

        .game-card:hover { transform: translateY(-10px); }
        
        /* Colores de acento personalizados por consola */
        .card-mame:hover { border-color: #ff0055; box-shadow: 0 15px 25px rgba(255, 0, 85, 0.4); }
        .card-snes:hover { border-color: #3b5998; box-shadow: 0 15px 25px rgba(59, 89, 152, 0.4); }
        .card-nes:hover { border-color: #ff3333; box-shadow: 0 15px 25px rgba(255, 51, 51, 0.4); }
        .card-mega:hover { border-color: #00ccff; box-shadow: 0 15px 25px rgba(0, 204, 255, 0.4); }

        .game-card img { width: 120px; height: 90px; object-fit: contain; margin-bottom: 15px; }
        .game-card h3 { margin: 0; color: #ffffff; font-size: 16px; font-weight: 600; text-align: center; }
        .game-card span { font-size: 11px; color: #ff9900; margin-top: 4px; font-weight: bold; text-transform: uppercase; }

        /* ---------------- CONTENEDOR DEL EMULADOR ---------------- */
        #emulator-container {
            width: 854px; 
            height: 480px; 
            max-width: 95vw; 
            max-height: 80vh;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
        }
    </style>
</head>
<body>

    <a href="index.html" id="btn-volver">← Volver al Inicio</a>
    <button id="btn-cerrar-juego" onclick="cerrarJuego()">❌ Cerrar Juego</button>

    <h1 id="tit">Consolas Más Míticas 🕹️</h1>
    <p id="sub">Juegos arcade y retro listos para jugar en un clic, sin configuraciones.</p>

    <div id="games-menu">
        <div class="game-card card-mame" onclick="lanzarJuego('arcade', 'roms/metalslug.zip')">
            <img src="mame_logo.png" alt="MAME">
            <h3>Metal Slug</h3>
            <span>MAME (Arcade)</span>
        </div>
        
        <div class="game-card card-snes" onclick="lanzarJuego('snes', 'roms/mario_world.sfc')">
            <img src="snes_logo.png" alt="SNES">
            <h3>Super Mario World</h3>
            <span>Super Nintendo</span>
        </div>
        
        <div class="game-card card-nes" onclick="lanzarJuego('nes', 'roms/mario_bros.nes')">
            <img src="nes_logo.png" alt="NES">
            <h3>Super Mario Bros</h3>
            <span>Nintendo NES</span>
        </div>

        <div class="game-card card-mega" onclick="lanzarJuego('segaMD', 'roms/sonic.gen')">
            <img src="megadrive_logo.png" alt="Mega Drive">
            <h3>Sonic The Hedgehog</h3>
            <span>Mega Drive</span>
        </div>
    </div>

    <div id="emulator-container"></div>

    <script>
        const gamesMenu = document.getElementById('games-menu');
        const emuContainer = document.getElementById('emulator-container');
        const btnVolver = document.getElementById('btn-volver');
        const btnCerrar = document.getElementById('btn-cerrar-juego');
        const titulo = document.getElementById('tit');
        const sub = document.getElementById('sub');

        function lanzarJuego(core, rutaRom) {
            // Ocultamos la interfaz para centrar la atención en el juego
            gamesMenu.style.display = 'none';
            btnVolver.style.display = 'none';
            titulo.style.display = 'none';
            sub.style.display = 'none';
            
            // Mostramos el contenedor y el botón de salir
            emuContainer.style.display = 'block';
            btnCerrar.style.display = 'block';
            
            // Creamos el div limpio donde se inyectará el emulador
            emuContainer.innerHTML = '<div id="game" style="width:100%; height:100%;"></div>';
            
            // Configuración del motor de EmulatorJS apuntando a tu ROM local
            window.EJS_player = '#game';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
            window.EJS_gameUrl = rutaRom; 
            window.EJS_startOnLoaded = true;
            window.EJS_core = core;
            
            // Inyección dinámica del script cargador
            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
            document.body.appendChild(script);
        }

        function cerrarJuego() {
            // Limpiamos y ocultamos el emulador
            emuContainer.style.display = 'none';
            emuContainer.innerHTML = '';
            btnCerrar.style.display = 'none';

            // Restauramos el menú principal
            titulo.style.display = 'block';
            sub.style.display = 'block';
            gamesMenu.style.display = 'flex';
            btnVolver.style.display = 'block';
        }
    </script>
</body>
</html>
