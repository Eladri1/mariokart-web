<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos Míticos - Sr. Croquetas ⚡</title>
    <style>
        body {
            background: linear-gradient(3deg, #0f0f1a 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 { color: #00ff66; margin-top: 40px; margin-bottom: 5px; font-size: 28px; text-shadow: 0 0 10px rgba(0,255,102,0.3); font-weight: 800; }
        p { color: #ffffff; margin-bottom: 30px; font-size: 16px; opacity: 0.8; }

        /* ---------------- BOTÓN VOLVER ATRÁS ---------------- */
        #btn-volver-consolas {
            position: absolute; top: 20px; left: 20px; text-decoration: none; 
            background: #ffffff; border: 2px solid #ffffff; color: #121212; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; 
            box-shadow: 0 0 15px rgba(255,255,255,0.2); transition: transform 0.2s; z-index: 10;
        }
        #btn-volver-consolas:hover { transform: scale(1.05); }

        /* Botón de cerrar el juego activo */
        #btn-cerrar-juego {
            display: none; position: absolute; top: 20px; left: 20px; 
            background: #ff3333; border: none; color: white; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 0 15px rgba(255,51,51,0.5); z-index: 100;
        }
        #btn-cerrar-juego:hover { transform: scale(1.05); }

        /* ---------------- REJILLA DE JUEGOS DIRECTOS (REORGANIZADA EN GRID/REFLOW) ---------------- */
        #games-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 750px; /* Fuerza a que se pongan 3 por fila */
            margin-bottom: 40px;
        }

        .game-card {
            background: #16161c;
            border: 2px solid #333344;
            border-radius: 15px;
            width: 200px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
        }

        .game-card:hover { transform: translateY(-10px); }
        
        /* Colores personalizados de brillo al pasar el ratón */
        .card-doom:hover { border-color: #00ff33; box-shadow: 0 15px 25px rgba(0, 255, 51, 0.4); }
        .card-mario64:hover { border-color: #e60012; box-shadow: 0 15px 25px rgba(230, 0, 18, 0.4); }
        .card-minecraft:hover { border-color: #578a34; box-shadow: 0 15px 25px rgba(87, 138, 52, 0.4); }
        .card-tomb:hover { border-color: #00ccff; box-shadow: 0 15px 25px rgba(0, 204, 255, 0.4); }
        .card-diablo:hover { border-color: #ff3300; box-shadow: 0 15px 25px rgba(255, 51, 0, 0.4); }
        .card-quake:hover { border-color: #ff9900; box-shadow: 0 15px 25px rgba(255, 153, 0, 0.4); }

        .game-card img { width: 140px; height: 100px; object-fit: contain; margin-bottom: 15px; }
        .game-card h3 { margin: 0; color: #ffffff; font-size: 17px; font-weight: 600; }

        /* ---------------- CONTENEDOR PANORÁMICO NATÍVO ---------------- */
        #game-container {
            width: 854px; 
            height: 480px; 
            max-width: 95vw; 
            max-height: 80vh;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
        }
    </style>
</head>
<body>

    <a href="index.html" id="btn-volver-consolas">← Ver Consolas</a>
    <button id="btn-cerrar-juego" onclick="cerrarJuego()">❌ Cerrar Juego</button>

    <h1 id="tit">Juegos Míticos Nativos 🕹️</h1>
    <p id="sub">Ejecución directa en el navegador, sin descargas ni emuladores.</p>

    <div id="games-menu">
        <div class="game-card card-doom" onclick="cargarWeb('https://wadcmd.com/')">
            <img src="doom_logo.png" alt="DOOM">
            <h3>DOOM</h3>
        </div>
        <div class="game-card card-mario64" onclick="cargarWeb('https://super-mario-64.bitbucket.io/')">
            <img src="mario_logo.png" alt="Super Mario 64">
            <h3>Super Mario 64</h3>
        </div>
