<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Emulador Clínico de DS ⚡</title>
    <style>
        /* Estilos oscuros tipo gamer / hacker */
        body {
            background-color: #1f1535;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 24px;
            color: #000000;
        }

        p {
            color: #000000;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Contenedor del emulador */
        #emulator-container {
            width: 800px;
            height: 600px;
            max-width: 95vw;
            max-height: 80vh;
            background: #1e1e1e;
            border: 2px dashed #a200ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Botón de carga guapo */
        .upload-btn {
            background-color: #a600ff;
            color: #121212;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }

        .upload-btn:hover {
            background-color: #a600ff;
            transform: scale(1.05);
        }

        input[type="file"] {
            display: none;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Nintendo DS Web Player 🕹️</h1>
    <p>Arrastra o selecciona cualquier archivo <strong>.nds</strong> para jugar al toque</p>
    
    <div id="emulator-container" id="drop-zone">
        <label class="upload-btn">
            Seleccionar ROM (.nds)
            <input type="file" id="rom-selector" accept=".nds">
        </label>
    </div>

    <script>
        const romSelector = document.getElementById('rom-selector');
        const container = document.getElementById('emulator-container');

        romSelector.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Alquimia pura: Convertimos tu archivo local en una URL temporal
            const tRomUrl = URL.createObjectURL(file);

            // Quitamos el botón y metemos el div que necesita el emulador
            container.style.border = "none";
            container.innerHTML = '<div id="game" style="width:100%; height:100%;"></div>';

            // Configuración global de EmulatorJS
            window.EmuJSWidth = "800";
            window.EmuJSHeight = "600";
            window.EmuJSFolder = "https://emulatorjs.org/emujs"; // Servidor con los motores WASM
            window.EmuPlatform = "nds";
            window.EmuRomUrl = tRomUrl;
            window.EmuJSStartOnLoaded = true;

            // Inyectamos el script principal que arranca la magia
            const script = document.createElement('script');
            script.src = "https://emulatorjs.org/emujs/emu-main.js";
            document.body.appendChild(script);
        });
    </script>

</body>
</html>
